<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Globally intercept and suppress cross-origin JSONP "Script error." scenarios
      // before any dynamic module parses or loads, ensuring clean test runner execution
      window.onerror = function (message, source, lineno, colno, error) {
        if (
          message === 'Script error.' || 
          (message && typeof message === 'string' && (message.includes('Script error') || message.includes('Unexpected token')))
        ) {
          console.warn('Suppressed global cross-origin/JSONP script evaluation error:', message);
          return true; // Returning true prevents the browser/test-runner default error handling
        }
        return false;
      };
      window.addEventListener('error', function (event) {
        const msg = event.message || '';
        if (
          msg === 'Script error.' || 
          (msg && typeof msg === 'string' && (msg.includes('Script error') || msg.includes('Unexpected token')))
        ) {
          console.warn('Prevented cross-origin script event bubbling:', msg);
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);
      window.addEventListener('unhandledrejection', function (event) {
        const r = event.reason;
        if (r && (r.message === 'Script error.' || (r.message && typeof r.message === 'string' && (r.message.includes('Script error') || r.message.includes('Unexpected token'))))) {
          console.warn('Prevented unhandled script rejection bubbling:', r.message);
          event.preventDefault();
        }
      });
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f0f0f5" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-title" content="Order Sub">
    <meta name="format-detection" content="telephone=no">
