<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Cross-origin JSONP failures expose only the generic browser message.
      // Suppress that exact message while leaving real application errors visible.
      window.addEventListener('error', function (event) {
        if (event.message === 'Script error.') {
          event.preventDefault();
        }
      });
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f0f0f5" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-title" content="Order Sub">
    <meta name="format-detection" content="telephone=no">
    
    <!-- Preconnect to Google Fonts to speed up loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload app logo -->
    <link rel="preload" as="image" href="/icon-192.png">
    
    <title>Order Submission</title>
    
    <!-- Favicon / Apple Icon - Using the new provided logo -->
    <link rel="icon" type="image/png" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="shortcut icon" type="image/png" href="/icon-192.png">
    <link rel="manifest" href="/manifest.json">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
